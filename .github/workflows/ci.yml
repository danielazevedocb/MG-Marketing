name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Types & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'dGVzdC1rZXktMzItYnl0ZXMtZm9yLWNpLW9ubHkhISE=' }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://placeholder.example.com
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-secret-32-chars-ok' }}
          AUTH_URL: https://placeholder.example.com
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'dGVzdC1rZXktMzItYnl0ZXMtZm9yLWNpLW9ubHkhISE=' }}
