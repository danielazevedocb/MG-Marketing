services:
  postgres:
    image: postgres:16-alpine
    container_name: mg-marketing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mg_marketing
    ports:
      - "5432:5432"
    volumes:
      - mg_marketing_pgdata:/var/lib/postgresql/data

volumes:
  mg_marketing_pgdata:
